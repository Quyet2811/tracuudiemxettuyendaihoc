<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Tính Điểm & Xét Tuyển Đại Học Toàn Diện</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --background: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #1e3a8a, #0d9488);
            color: white;
            padding: 30px 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(30, 58, 138, 0.2);
        }

        header h1 { margin: 0 0 10px 0; font-size: 26px; }
        header p { margin: 0; opacity: 0.9; font-size: 15px; }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
        }

        h2 {
            margin-top: 0;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 12px;
            color: #1e293b;
            font-size: 19px;
        }

        .score-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
            color: #475569;
        }

        input[type="number"], select {
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.2s;
            background-color: #fff;
        }

        input[type="number"]:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 640px) {
            .grid-2 { grid-template-columns: 1fr; }
            body { padding: 10px; }
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(79, 70, 229, 0.2);
        }

        button:hover { background-color: #4338ca; }
        button:active { transform: scale(0.99); }

        .comb-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
        }

        .comb-badge {
            background: #e2e8f0;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
        }

        .result-item {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }

        .result-item:hover { transform: translateY(-2px); }

        .status-pass { background-color: #f0fdf4; border-left: 6px solid var(--success-color); }
        .status-warn { background-color: #fffbeb; border-left: 6px solid var(--warning-color); }
        .status-fail { background-color: #fef2f2; border-left: 6px solid var(--danger-color); }

        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
            color: white;
            text-align: center;
            display: inline-block;
            white-space: nowrap;
        }

        .badge-pass { background-color: var(--success-color); }
        .badge-warn { background-color: var(--warning-color); }
        .badge-fail { background-color: var(--danger-color); }

        .note-text { color: #b45309; font-weight: 600; margin-top: 6px; display: block; font-size: 13px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Hệ Thống Xét Tuyển Đại Học Tự Động (TMU - HUS - UEB)</h1>
        <p>Phiên bản cấu trúc dữ liệu tách biệt - Sẵn sàng mở rộng không giới hạn</p>
    </header>

    <div class="card">
        <h2>1. Nhập điểm thi các môn của bạn</h2>
        <div class="score-grid">
            <div class="form-group"><label>Toán</label><input type="number" id="m-toan" min="0" max="10" step="0.01" placeholder="0.0"></div>
            <div class="form-group"><label>Ngữ văn</label><input type="number" id="m-van" min="0" max="10" step="0.01" placeholder="0.0"></div>
            <div class="form-group"><label>Vật lí</label><input type="number" id="m-ly" min="0" max="10" step="0.01" placeholder="0.0"></div>
            <div class="form-group"><label>Hóa học</label><input type="number" id="m-hoa" min="0" max="10" step="0.01" placeholder="0.0"></div>
            <div class="form-group"><label>Sinh học</label><input type="number" id="m-sinh" min="0" max="10" step="0.01" placeholder="0.0"></div>
            <div class="form-group"><label>Lịch sử</label><input type="number" id="m-su" min="0" max="10" step="0.01" placeholder="0.0"></div>
            <div class="form-group"><label>Địa lí</label><input type="number" id="m-dia" min="0" max="10" step="0.01" placeholder="0.0"></div>
            <div class="form-group"><label>Tin học</label><input type="number" id="m-tin" min="0" max="10" step="0.01" placeholder="0.0"></div>
            <div class="form-group"><label>GDKT và Pháp luật</label><input type="number" id="m-gdktdpl" min="0" max="10" step="0.01" placeholder="0.0"></div>
            <div class="form-group"><label>Công nghệ công nghiệp</label><input type="number" id="m-cncn" min="0" max="10" step="0.01" placeholder="0.0"></div>
            <div class="form-group"><label>Công nghệ nông nghiệp</label><input type="number" id="m-cnnn" min="0" max="10" step="0.01" placeholder="0.0"></div>
            <div class="form-group"><label>Tiếng Anh</label><input type="number" id="m-anh" min="0" max="10" step="0.01" placeholder="0.0"></div>
            <div class="form-group"><label>Tiếng Nga</label><input type="number" id="m-nga" min="0" max="10" step="0.01" placeholder="0.0"></div>
            <div class="form-group"><label>Tiếng Pháp</label><input type="number" id="m-phap" min="0" max="10" step="0.01" placeholder="0.0"></div>
            <div class="form-group"><label>Tiếng Trung</label><input type="number" id="m-trung" min="0" max="10" step="0.01" placeholder="0.0"></div>
            <div class="form-group"><label>Tiếng Đức</label><input type="number" id="m-duc" min="0" max="10" step="0.01" placeholder="0.0"></div>
            <div class="form-group"><label>Tiếng Nhật</label><input type="number" id="m-nhat" min="0" max="10" step="0.01" placeholder="0.0"></div>
            <div class="form-group"><label>Tiếng Hàn</label><input type="number" id="m-han" min="0" max="10" step="0.01" placeholder="0.0"></div>
        </div>
    </div>

    <div class="card">
        <h2>2. Chọn Ngành Tuyển Sinh</h2>
        <div class="grid-2">
            <div class="form-group">
                <label>Nhóm ngành lớn của Trường</label>
                <select id="main-industry" onchange="updateSubIndustries()">
                    <option value="">-- Chọn nhóm ngành --</option>
                </select>
            </div>
            <div class="form-group">
                <label>Chuyên ngành chi tiết</label>
                <select id="sub-industry">
                    <option value="">-- Vui lòng chọn ngành lớn trước --</option>
                </select>
            </div>
        </div>
    </div>

    <button onclick="calculateAndSuggest()">PHÂN TÍCH KẾT QUẢ XÉT TUYỂN</button>

    <div class="card hidden" id="result-card">
        <h2>3. Kết Quả Tổ Hợp Khả Dụng & Tỷ Lệ Đỗ</h2>
        <div id="detected-combinations-box">
            <span style="font-weight: 600; font-size: 14px; color:#475569;">Các tổ hợp tính được điểm từ điểm bạn nhập:</span>
            <div class="comb-badges" id="comb-badges-container"></div>
        </div>
        <hr style="border:0; border-top: 1px solid #e2e8f0; margin: 20px 0;">
        <div id="results-container"></div>
    </div>
</div>

<script src="database.js"></script>

<script>
    // Hàm tự động chạy sau khi tải trang để đổ dữ liệu từ database.js vào Select Box
    window.addEventListener('DOMContentLoaded', () => {
        if (typeof DATA_DATABASE === 'undefined') {
            alert("Lỗi: Không tìm thấy file dữ liệu database.js! Hãy chắc chắn rằng file database.js nằm chung thư mục với file index.html");
            return;
        }
        const mainSelect = document.getElementById('main-industry');
        for (let key in DATA_DATABASE) {
            let option = document.createElement('option');
            option.value = key;
            option.innerText = DATA_DATABASE[key].name;
            mainSelect.appendChild(option);
        }
    });

    function updateSubIndustries() {
        const mainKey = document.getElementById('main-industry').value;
        const subSelect = document.getElementById('sub-industry');
        subSelect.innerHTML = '<option value="">-- Chọn chuyên ngành --</option>';
        if (!mainKey || !DATA_DATABASE[mainKey]) return;

        const subs = DATA_DATABASE[mainKey].subs;
        for (let key in subs) {
            let option = document.createElement('option');
            option.value = key;
            option.innerText = `[${key}] ${subs[key].name}`;
            subSelect.appendChild(option);
        }
    }

    function calculateAndSuggest() {
        let userScores = {};
        document.querySelectorAll('.score-grid input').forEach(input => {
            let val = parseFloat(input.value);
            if (!isNaN(val)) userScores[input.id] = val;
        });

        if (Object.keys(userScores).length === 0) {
            alert("Vui lòng nhập điểm ít nhất 3 môn học!");
            return;
        }

        const mainIndustryKey = document.getElementById('main-industry').value;
        const subIndustryKey = document.getElementById('sub-industry').value;

        if (!mainIndustryKey || !subIndustryKey) {
            alert("Vui lòng chọn đầy đủ ngành lớn và chuyên ngành chi tiết!");
            return;
        }

        // Tính điểm cho các tổ hợp khả dụng từ COMBINATIONS_DB trong database.js
        let calculatedCombinations = {};
        for (let combName in COMBINATIONS_DB) {
            let requiredSubjects = COMBINATIONS_DB[combName];
            let hasAll = requiredSubjects.every(subId => userScores[subId] !== undefined);
            if (hasAll) {
                let sumScore = requiredSubjects.reduce((total, subId) => total + userScores[subId], 0);
                calculatedCombinations[combName] = parseFloat(sumScore.toFixed(2));
            }
        }

        const badgesContainer = document.getElementById('comb-badges-container');
        badgesContainer.innerHTML = '';
        let combKeys = Object.keys(calculatedCombinations);
        if (combKeys.length === 0) {
            badgesContainer.innerHTML = '<span style="color:var(--danger-color); font-size:14px;">Bạn chưa nhập đủ môn thuộc bất kỳ tổ hợp xét tuyển nào.</span>';
        } else {
            combKeys.forEach(k => {
                let badge = document.createElement('span');
                badge.className = 'comb-badge';
                badge.innerText = `${k}: ${calculatedCombinations[k]} đ`;
                badgesContainer.appendChild(badge);
            });
        }

        const schoolList = DATA_DATABASE[mainIndustryKey].subs[subIndustryKey].schools;
        const resultsContainer = document.getElementById('results-container');
        resultsContainer.innerHTML = ''; 
        document.getElementById('result-card').classList.remove('hidden');

        let matchCount = 0;
        let userToan = userScores["m-toan"] || 0;

        schoolList.forEach(school => {
            if (calculatedCombinations[school.code] !== undefined) {
                matchCount++;
                let myScore = calculatedCombinations[school.code];
                let isScorePassed = myScore >= school.lastYearScore;
                
                // Kiểm tra tiêu chí phụ môn Toán
                let isMathPassed = true;
                if (school.mathMin !== undefined && userToan < school.mathMin) {
                    isMathPassed = false;
                }

                let statusClass = 'status-pass';
                let badgeClass = 'badge-pass';
                let badgeText = 'TỶ LỆ ĐỖ CAO (AN TOÀN)';
                let noteHtml = '';

                if (!isScorePassed) {
                    statusClass = 'status-fail';
                    badgeClass = 'badge-fail';
                    badgeText = 'TỶ LỆ ĐỖ THẤP (NGUY CƠ)';
                } else if (!isMathPassed) { 
                    statusClass = 'status-warn';
                    badgeClass = 'badge-warn';
                    badgeText = 'ĐIỀU KIỆN PHỤ CHƯA ĐẠT';
                }

                if (school.mathMin !== undefined) {
                    noteHtml = `<span class="note-text">⚠️ Tiêu chí phụ ngành này: Điểm Toán phải ≥ ${school.mathMin} (Điểm Toán của bạn: ${userToan})</span>`;
                }

                let div = document.createElement('div');
                div.className = `result-item ${statusClass}`;
                div.innerHTML = `
                    <div>
                        <strong style="font-size: 17px; color:#1e293b;">${school.schoolName}</strong><br>
                        <span style="font-size: 14px; color: #64748b;">Mã tổ hợp xét tuyển: <strong style="color:#0f172a;">${school.code}</strong></span><br>
                        <span style="font-size: 14px;">Điểm của bạn: <strong style="color:var(--primary-color); font-size:16px;">${myScore}</strong> đ</span> | 
                        <span style="font-size: 14px; color: #475569;">Điểm chuẩn năm ngoái: <strong>${school.lastYearScore}</strong> đ</span>
                        ${noteHtml}
                    </div>
                    <div>
                        <span class="badge ${badgeClass}">${badgeText}</span>
                    </div>
                `;
                resultsContainer.appendChild(div);
            }
        });

        if (matchCount === 0 && combKeys.length > 0) {
            resultsContainer.innerHTML = `<div style="padding: 15px; background: #fffbeb; border: 1px solid #fef3c7; border-radius: 8px; color: #b45309;">Ngành này không xét tuyển các tổ hợp môn bạn hiện có. Hãy nhập thêm môn hoặc đổi ngành khác nhé!</div>`;
        }
        document.getElementById('result-card').scrollIntoView({ behavior: 'smooth' });
    }
</script>
</body>
</html>
